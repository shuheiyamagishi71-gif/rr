<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Consultar Descontos</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      linear-gradient(rgba(255,192,203,.45),rgba(255,192,203,.45)),
      url('https://images.unsplash.com/photo-1516321318423-f06f85e504b3?fit=crop&w=1400&q=80') center/cover no-repeat;
}
.card{
    width:90%;
    max-width:420px;
    background:rgba(255,255,255,.96);
    backdrop-filter:blur(4px);
    border-radius:24px;
    padding:30px 24px;
    text-align:center;
    box-shadow:0 20px 40px rgba(0,0,0,.25);
}
h1{
    color:#be185d;
    font-size:28px;
    line-height:1.2;
    margin:0 0 16px;
}
p{
    color:#9d174d;
    font-size:18px;
    margin-bottom:26px;
}
.btn{
    display:block;
    text-decoration:none;
    background:#ec4899;
    color:#fff;
    padding:16px;
    border-radius:14px;
    font-weight:bold;
    font-size:18px;
}
.btn:hover{
    background:#db2777;
}
</style>
</head>
<body>
    <div class="card">
        <h1>Confira se há descontos liberados no seu nome</h1>
        <p>Verifique em segundos</p>
        <a class="btn" href="https://cliente-x-limpfeirao.shop/">
            Consultar agora
        </a>
    </div>
</body>
</html>
